name: Build libfcitx5platforminputcontextplugin

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  QT_VERSION: 6.8.2

jobs:
  build-plugin:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Install plugin build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libfcitx5core-dev \
            libfcitx5utils-dev \
            libfcitx5config-dev \
            extra-cmake-modules \
            pkg-config \
            gettext \
            libxcb1-dev libxcb-util-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl-dev \
            libwayland-dev wayland-protocols

      - name: Clone fcitx5-qt source
        run: git clone --depth=1 --branch 5.1.7 https://github.com/fcitx/fcitx5-qt.git fcitx5-qt-5.1.7

      - name: Build fcitx5-qt plugin
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT4=OFF \
            -DENABLE_QT5=OFF \
            -DENABLE_QT6=ON \
            -DWITH_FCITX_PLUGIN_ONLY=ON \
            -DENABLE_WAYLAND=OFF \
            fcitx5-qt-5.1.7
          cmake --build build --parallel $(nproc)

      - name: Collect artifact
        run: |
          mkdir -p output
          find build -name "libfcitx5platforminputcontextplugin.so" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libfcitx5platforminputcontextplugin-qt682
          path: output/libfcitx5platforminputcontextplugin.so
          if-no-files-found: error
